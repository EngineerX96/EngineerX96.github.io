title: EngineerX96's Space
description: 记录技术心得、学习笔记与个人分享
author: EngineerX96
email: ""
url: "https://engineerx96.github.io"
baseurl: ""

# 分页
paginate: 10
paginate_path: "/page:num/"

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# 插件
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
