<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="wrapper nav-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">首页</a></li>
          <li><a href="{{ '/about' | relative_url }}">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>© {{ 'now' | date: "%Y" }} <a href="{{ '/' | relative_url }}">{{ site.author }}</a> · 用心记录，持续分享</p>
    </div>
  </footer>

</body>
</html>
